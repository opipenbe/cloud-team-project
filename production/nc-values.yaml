# Permissions fix from: https://github.com/nextcloud/helm/issues/187#issuecomment-2674561977
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  timeout: 15m
  chart:
    spec:
      version: ">=9.0.0 <10.0.0"
  values:
    resources:
      limits:
       memory: 512Mi
      requests:
       cpu: 256m
       memory: 128Mi
    replicaCount: 1
    httpRoute:
      enabled: true
      hostnames:
        - files.pipenberg.eu
      parentRefs:
      - name: infra-gateway
        sectionName: websecure
        namespace: traefik
    phpClientHttpsFix:
      enabled: true
      protocol: https
    nextcloud:
      host: files.pipenberg.eu
      trustedDomains:
        - nextcloud.kube.home
        - files.pipenberg.eu
      existingSecret: 
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      extraInitContainers:
        - name: create-redis-session-ini
          image: busybox:1.36-uclibc
          command:
            - sh
            - -c
            - touch /mnt/redis-session.ini
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: php-confd
              mountPath: /mnt
      extraVolumeMounts:
        - name: php-confd
          mountPath: /usr/local/etc/php/conf.d/redis-session.ini
          subPath: redis-session.ini
      extraVolumes:
        - name: php-confd
          emptyDir: {}
      podSecurityContext:
        fsGroup: 33 # Without fsGroup=33 Nextcloud will crash, since it requires the data directory to be owned by the www-data user.
        runAsGroup: 33 # www-data
        runAsNonRoot: true
        runAsUser: 33 # www-data
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      #mariaDbInitContainer:
      #  securityContext:
      #    runAsUser: 33
      #    runAsGroup: 33
      #    runAsNonRoot: true
      #    readOnlyRootFilesystem: true
      #    allowPrivilegeEscalation: false
      #    capabilities:
      #      drop:
      #        - ALL
    persistence:
        enabled: true
        nextcloudData:
          enabled: true
          accessMode: ReadWriteOnce
          size: 8Gi
    internalDatabase:
      enabled: true
    externalDatabase:
      enabled: true
      type: mariadb
      existingSecret:
        enabled: true
        secretName: "mariadb-credentials"
        usernameKey: mariadb-username
        passwordKey: mariadb-password
    externalRedis:
      enabled: false
      existingSecret:
        enabled: true
        secretName: "redis-credentials"
        passwordKey: redis-password
    mariadb:
      enabled: true
      auth:
        existingSecret: "mariadb-credentials"
        database: nextcloud
      primary:
        persistence:
          enabled: true
      mariaDbInitContainer:
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
    redis:
      auth:
        enabled: true
        existingSecret: "redis-credentials"
        existingSecretPasswordKey: "redis-password"
      enabled: true
      master:
        persistence:
          enabled: true
