apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  chart:
    spec:
      version: ">=9.0.0 <10.0.0"
  values:
    replicaCount: 1
    httpRoute:
      enabled: true
      hostnames:
        - files.pipenberg.eu
      parentRefs:
      - name: infra-gateway
        sectionName: websecure
        namespace: traefik
    phpClientHttpsFix:
      enabled: true
      protocol: https
    nextcloud:
      host: nextcloud.kube.home
      trustedDomains:
        - nextcloud.kube.home
        - files.pipenberg.eu
      existingSecret: 
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
    persistence:
        enabled: true
        nextcloudData:
          enabled: true
          accessMode: ReadWriteOnce
          size: 8Gi
    internalDatabase:
      enabled: false
    mariadb:
      enabled: true
      auth:
        existingSecret: "mariadb-credentials"
      primary:
        persistence:
          enabled: true
    redis:
      auth:
        existingSecret: "redis-credentials"
        existingSecretPasswordKey: "redis-password"
      enabled: true
      master:
        persistence:
          enabled: true
